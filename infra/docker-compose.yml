services:
  # --- MinIO (S3-compatible storage) ---
  minio:
    image: minio/minio:latest
    container_name: dmp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO bucket initialization ---
  minio-init:
    image: minio/mc:latest
    container_name: dmp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/raw-videos --ignore-existing;
      mc mb local/processed-videos --ignore-existing;
      mc anonymous set download local/processed-videos;
      echo 'Buckets created successfully';
      "

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: dmp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_processing
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: dmp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- API Server ---
  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: dmp-api
    ports:
      - "3001:3001"
    env_file:
      - ../.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # --- Worker Service ---
  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    container_name: dmp-worker
    env_file:
      - ../.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -q 'apps/worker/src/index.ts'"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

volumes:
  minio-data:
  postgres-data:
  redis-data:
